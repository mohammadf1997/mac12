name: Build macOS App (Fixed)

on: [push]

jobs:
  build:
    runs-on: macos-12
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          brew install tcl-tk
          brew install python-tk@3.11

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller openpyxl matplotlib tkcalendar pandas

      - name: Build with PyInstaller (with Tkinter fix)
        run: |
          pyinstaller --name "InternshipTracker" \
            --windowed \
            --onefile \
            --add-data "$(python -c \"import tkinter; print(tkinter.__path__[0])\"):tkinter" \
            --hidden-import tkinter \
            --hidden-import openpyxl \
            --hidden-import matplotlib \
            --hidden-import tkcalendar \
            --hidden-import pandas \
            --osx-bundle-identifier com.yourcompany.internshiptracker \
            --target-architecture universal2 \
            main.py

      - name: Zip and upload
        run: |
          cd dist
          zip -r InternshipTracker_Mac.zip InternshipTracker.app
          
      - uses: actions/upload-artifact@v4
        with:
          name: Mac-App
          path: dist/InternshipTracker_Mac.zip
